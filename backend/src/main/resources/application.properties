spring.application.name=inazuma

spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/inazuma_tfg}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.web.resources.static-locations=file:./static/,classpath:/static/

server.port=${PORT:8080}

# Serialize dates/times as ISO-8601 strings, not timestamp arrays
spring.jackson.serialization.write-dates-as-timestamps=false
